<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151C28"/>
      <stop offset="1" stop-color="#05080F"/>
    </linearGradient>
    <linearGradient id="panel" x1="8" y1="9" x2="29" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6EAF0"/>
    </linearGradient>
    <linearGradient id="pink" x1="24" y1="17" x2="36" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6AAE"/>
      <stop offset="0.55" stop-color="#FF1493"/>
      <stop offset="1" stop-color="#D900FF"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="40" height="40" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="40" height="40" rx="8" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- terminal window frame -->
    <path d="M7.5 11.8C7.5 9.7 9.2 8 11.3 8H29.2C31.3 8 33 9.7 33 11.8V18.8C33 19.4 32.5 20 31.8 20C31.2 20 30.7 20.5 30.7 21.1V29.2H11.3C9.2 29.2 7.5 27.5 7.5 25.4V11.8Z" fill="url(#panel)"/>
    <rect x="9" y="13.7" width="20.7" height="14" rx="2.1" fill="#08101C"/>

    <!-- traffic dots -->
    <circle cx="11.5" cy="10.9" r="1" fill="#FF4D4D"/>
    <circle cx="14.5" cy="10.9" r="1" fill="#FFC145"/>
    <circle cx="17.5" cy="10.9" r="1" fill="#28D665"/>

    <!-- console prompt -->
    <path d="M13.2 18.1L16.8 20.9L13.2 23.7" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M18.9 24.1H22.8" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>

    <!-- speaker -->
    <path d="M23.5 20.4C23.5 19.7 24.1 19.1 24.8 19.1H26.4L29.5 16.4C30.2 15.8 31.2 16.3 31.2 17.2V28.2C31.2 29.1 30.2 29.6 29.5 29L26.4 26.3H24.8C24.1 26.3 23.5 25.7 23.5 25V20.4Z" fill="url(#pink)"/>

    <!-- sound waves -->
    <path d="M32.7 20.3C33.8 21.7 33.8 23.7 32.7 25.1" stroke="url(#pink)" stroke-width="1.9" stroke-linecap="round"/>
    <path d="M34.6 18.6C36.5 20.9 36.5 24.5 34.6 26.8" stroke="url(#pink)" stroke-width="1.9" stroke-linecap="round"/>
    <path d="M36.4 16.9C39 20.2 39 25.2 36.4 28.5" stroke="url(#pink)" stroke-width="1.9" stroke-linecap="round"/>
  </g>
</svg>
